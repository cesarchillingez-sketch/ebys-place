name = "ebysplace-tryon-api"
main = "index.js"
compatibility_date = "2024-01-01"

# ─── Routes ──────────────────────────────────────────────────────────────────
# Replace the pattern below with your actual Worker domain / custom domain.
# This example binds the worker to https://www.ebysplace.com/api/*

[[routes]]
pattern = "www.ebysplace.com/api/*"
zone_name = "ebysplace.com"

# ─── Secrets (set via CLI, never committed to source control) ────────────────
# Run:
#   wrangler secret put REPLICATE_API_KEY
# and paste your Replicate API token when prompted.

# ─── KV namespace for rate limiting (optional but recommended) ───────────────
# Create a namespace first:
#   wrangler kv namespace create RATE_LIMITER
# Then paste the generated id below.

[[kv_namespaces]]
binding = "RATE_LIMITER"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ─── Build (no bundler required — Workers supports ES modules natively) ───────
[build]
command = ""
