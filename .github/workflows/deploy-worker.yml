# Deploy the AI Try-On Cloudflare Worker on every push to main.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — A Cloudflare API token with "Edit Workers" permission.
#                           Create one at https://dash.cloudflare.com/profile/api-tokens
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare Account ID
#                           (dash.cloudflare.com → right sidebar on any zone page)
#   REPLICATE_API_KEY     — Your Replicate API key (replicate.com/account/api-tokens)
#
# The REPLICATE_API_KEY is stored as a Cloudflare Worker secret (encrypted, never in code).
# The other two secrets are only used by this workflow runner to authenticate with Cloudflare.

name: Deploy Cloudflare Worker

on:
  push:
    branches: ["main"]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: "worker-deploy"
  cancel-in-progress: true

# Restrict the default GITHUB_TOKEN to read-only; wrangler-action uses the
# CLOUDFLARE_API_TOKEN secret directly and does not need write permissions here.
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy worker to Cloudflare
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # Push REPLICATE_API_KEY as a Worker secret so it is encrypted at rest
          # and never exposed to the browser.
          secrets: |
            REPLICATE_API_KEY
        env:
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
